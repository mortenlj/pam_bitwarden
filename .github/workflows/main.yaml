name: pam_bitwarden

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    uses: mortenlj/mise-lib/.github/workflows/setup.yaml@main

  ci:
    needs: setup
    uses: mortenlj/mise-lib/.github/workflows/ci.yaml@main
    with:
      ci-tasks: ${{ needs.setup.outputs.ci-tasks }}

  build:
    needs:
      - setup
      - ci
    uses: mortenlj/mise-lib/.github/workflows/build.yaml@main
    with:
      version: ${{ fromJSON(needs.setup.outputs.version) }}
      clean-version: ${{ fromJSON(needs.setup.outputs.clean-version) }}
      release-build-tasks: ${{ needs.setup.outputs.release-build-tasks }}
      artifacts: ${{ needs.setup.outputs.artifacts }}

  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      id-token: write
    needs:
      - setup
      - build
    if: ${{ fromJSON(needs.setup.outputs.run-publish) }}
    steps:
      - name: Download a Build Artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          merge-multiple: true
          path: artifacts/

      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ fromJSON(needs.setup.outputs.clean-version) }}
          name: Release ${{ fromJSON(needs.setup.outputs.version) }}
          draft: false
          prerelease: false
          files: artifacts/*
